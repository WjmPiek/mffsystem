services:
  - type: web
    name: martinsdirect-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: martinsdirect-db
          property: connectionString
      - key: UPLOAD_ROOT
        value: /opt/render/project/src/storage/uploads
      - key: EXPORT_ROOT
        value: /opt/render/project/src/storage/exports

  - type: web
    name: martinsdirect-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://martinsdirect-backend.onrender.com

databases:
  - name: martinsdirect-db
    plan: free
    databaseName: martinsdirect
    user: postgres